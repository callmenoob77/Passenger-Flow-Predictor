name: METAR live ingest

on:
  schedule:
    - cron: "*/15 * * * *"   # la 15 min (UTC; poate intarzia cateva min la trafic mare)
  workflow_dispatch:           # buton de rulare manuala, pentru test

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests pandas psycopg2-binary
      - run: python data-pipeline/live_ingest.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}